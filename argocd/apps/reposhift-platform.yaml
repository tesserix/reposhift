apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reposhift-platform
  namespace: argocd
spec:
  project: github-migrator
  source:
    repoURL: https://github.com/tesserix/reposhift.git
    path: charts/reposhift-platform
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: git-migrator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
