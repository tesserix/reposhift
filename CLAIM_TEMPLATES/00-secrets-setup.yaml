# ==============================================================================
# SECRETS SETUP GUIDE
# ==============================================================================
#
# Before you can run any migrations, you need to create Kubernetes secrets
# that contain your Azure DevOps and GitHub credentials.
#
# This file shows you EXACTLY how to create these secrets.
#
# ==============================================================================

# ==============================================================================
# SECRET CREATION OPTIONS
# ==============================================================================
#
# You have 2 ways to create secrets:
#   1. kubectl create secret (recommended for dev/test)
#   2. YAML files (recommended for production with GitOps)
#
# Choose the method that works for your environment.
#
# ==============================================================================

# ==============================================================================
# METHOD 1: KUBECTL COMMANDS (EASIEST)
# ==============================================================================
#
# These commands create secrets directly in Kubernetes.
# Good for: Local testing, development environments
#
# ==============================================================================

# -----------------------------------------------------------------------------
# AZURE SERVICE PRINCIPAL SECRET
# -----------------------------------------------------------------------------
#
# What you need:
# - Client ID (from Azure App Registration)
# - Client Secret (from Azure App Registration)
# - Tenant ID (from Azure Portal)
#
# How to get these:
# 1. Go to Azure Portal → Azure Active Directory → App Registrations
# 2. Create new registration (or use existing)
# 3. Copy "Application (client) ID" → This is your CLIENT_ID
# 4. Copy "Directory (tenant) ID" → This is your TENANT_ID
# 5. Go to "Certificates & secrets" → New client secret
# 6. Copy the secret value → This is your CLIENT_SECRET
# 7. Give the app "Read" access to Azure DevOps
#
# Create the secret:
#
# kubectl create secret generic azure-sp-secret \
#   --namespace=ado-git-migration \
#   --from-literal=client-id="YOUR-CLIENT-ID-HERE" \
#   --from-literal=client-secret="YOUR-CLIENT-SECRET-HERE" \
#   --from-literal=tenant-id="YOUR-TENANT-ID-HERE"
#
# Example:
# kubectl create secret generic azure-sp-secret \
#   --namespace=ado-git-migration \
#   --from-literal=client-id="12345678-1234-1234-1234-123456789abc" \
#   --from-literal=client-secret="abcDEF123~ghiJKL456-mnoPQR789" \
#   --from-literal=tenant-id="87654321-4321-4321-4321-ba987654321c"

# -----------------------------------------------------------------------------
# GITHUB PERSONAL ACCESS TOKEN SECRET
# -----------------------------------------------------------------------------
#
# What you need:
# - GitHub Personal Access Token (PAT)
#
# How to get a PAT:
# 1. Go to GitHub → Settings → Developer Settings → Personal Access Tokens
# 2. Click "Tokens (classic)" → Generate new token (classic)
# 3. Give it a name like "ADO Migration"
# 4. Select scopes:
#    ✅ repo (all)
#    ✅ workflow
#    ✅ write:org (if creating repos in an organization)
#    ✅ project (if using GitHub Projects)
# 5. Click "Generate token"
# 6. Copy the token (you only see it once!)
#
# Create the secret:
#
# kubectl create secret generic github-token-secret \
#   --namespace=ado-git-migration \
#   --from-literal=token="YOUR-GITHUB-TOKEN-HERE"
#
# Example:
# kubectl create secret generic github-token-secret \
#   --namespace=ado-git-migration \
#   --from-literal=token="ghp_1234567890abcdefghijklmnopqrstuvwxyz"

# -----------------------------------------------------------------------------
# GITHUB APP SECRET (OPTIONAL - For Production)
# -----------------------------------------------------------------------------
#
# GitHub App is recommended for production because:
# - Higher rate limits (5000 requests/hour vs 5000/hour for PAT)
# - Better security (scoped to specific repos/orgs)
# - Can be managed by organization admins
#
# What you need:
# - App ID
# - Installation ID
# - Private Key (PEM file)
#
# How to create a GitHub App:
# 1. Go to GitHub → Settings → Developer Settings → GitHub Apps
# 2. Click "New GitHub App"
# 3. Fill in:
#    - App name: "ADO Migration Bot"
#    - Homepage URL: https://your-company.com
#    - Webhook: Disable (uncheck "Active")
# 4. Permissions:
#    - Repository permissions:
#      * Contents: Read & Write
#      * Issues: Read & Write
#      * Pull requests: Read & Write
#      * Administration: Read & Write
#    - Organization permissions:
#      * Members: Read
#      * Projects: Read & Write
# 5. Click "Create GitHub App"
# 6. Copy "App ID"
# 7. Scroll down → Generate a private key → Save the .pem file
# 8. Go to "Install App" → Install on your organization
# 9. Copy the Installation ID from the URL (github.com/settings/installations/INSTALLATION_ID)
#
# Create the secret:
#
# kubectl create secret generic github-app-secret \
#   --namespace=ado-git-migration \
#   --from-literal=app-id="YOUR-APP-ID" \
#   --from-literal=installation-id="YOUR-INSTALLATION-ID" \
#   --from-file=private-key=/path/to/your-app-private-key.pem
#
# Example:
# kubectl create secret generic github-app-secret \
#   --namespace=ado-git-migration \
#   --from-literal=app-id="123456" \
#   --from-literal=installation-id="98765432" \
#   --from-file=private-key=/Users/me/Downloads/my-app.2024-01-15.private-key.pem

# ==============================================================================
# VERIFY YOUR SECRETS
# ==============================================================================
#
# After creating secrets, verify they exist:
#
# kubectl get secrets -n ado-git-migration
#
# Expected output:
# NAME                  TYPE     DATA   AGE
# azure-sp-secret       Opaque   3      1m
# github-token-secret   Opaque   1      1m
#
# Check a specific secret:
#
# kubectl describe secret azure-sp-secret -n ado-git-migration
#
# You should see:
# Data
# ====
# client-id:      36 bytes
# client-secret:  40 bytes
# tenant-id:      36 bytes
#
# ==============================================================================
# SECURITY BEST PRACTICES
# ==============================================================================
#
# 1. NEVER commit secrets to Git
#    - Add *.yaml with real secrets to .gitignore
#    - Use templates with placeholders instead
#
# 2. Use least-privilege access
#    - Azure SP: Only "Read" access to ADO
#    - GitHub: Only required scopes (repo, workflow)
#
# 3. Rotate secrets regularly
#    - Change tokens every 90 days
#    - Update secrets in Kubernetes after rotation
#
# 4. Use GitHub App instead of PAT for production
#    - Better audit trail
#    - Scoped to specific repos
#    - Can be managed by org admins
#
# 5. Store secrets in a secrets manager
#    - Use External Secrets Operator
#    - Pull from Azure Key Vault, AWS Secrets Manager, etc.
#    - Don't store secrets in Kubernetes long-term
#
# ==============================================================================
# UPDATING SECRETS
# ==============================================================================
#
# To update an existing secret:
#
# 1. Delete the old secret:
#    kubectl delete secret azure-sp-secret -n ado-git-migration
#
# 2. Create the new secret:
#    kubectl create secret generic azure-sp-secret \
#      --namespace=ado-git-migration \
#      --from-literal=client-id="NEW-CLIENT-ID" \
#      --from-literal=client-secret="NEW-CLIENT-SECRET" \
#      --from-literal=tenant-id="NEW-TENANT-ID"
#
# 3. Restart the operator (to pick up new secret):
#    kubectl rollout restart deployment ado-git-migration-operator -n ado-git-migration
#
# ==============================================================================
# TROUBLESHOOTING
# ==============================================================================
#
# Problem: "Secret not found" error
# Solution: Make sure secret exists in the correct namespace
#   kubectl get secrets -n ado-git-migration
#
# Problem: "Authentication failed" error
# Solution: Check your credentials are correct
#   kubectl get secret azure-sp-secret -n ado-git-migration -o yaml
#   (Decode base64 values to verify)
#
# Problem: "Permission denied" error
# Solution: Check your Azure SP or GitHub token has the right permissions
#   - Azure: "Read" access to ADO project
#   - GitHub: "repo", "workflow" scopes
#
# ==============================================================================
