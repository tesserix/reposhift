image:
  repository: ghcr.io/tesserix/reposhift-web
  tag: latest
  pullPolicy: Always

replicaCount: 1

port: 3005

platformApiUrl: "http://reposhift-platform:8090"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

ingress:
  enabled: false
  host: ""
  tls: false
  className: ""
  annotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

env: {}
