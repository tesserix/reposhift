nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/tesserix/reposhift-platform
  tag: latest
  pullPolicy: Always

replicaCount: 1
imagePullSecrets: []

port: 8090

# Required: generate with `openssl rand -hex 32`
adminToken: ""

# PostgreSQL connection
postgresql:
  host: "localhost"
  port: 5432
  database: reposhift_db
  user: reposhift_user
  sslmode: disable

# Required: database password
postgresPassword: ""

# Operator API URL (internal service)
operatorURL: "http://reposhift-operator:8080"

# CORS
cors:
  allowedOrigins: "http://localhost:3005"

# K8s namespace for migration CRDs and secrets
k8sNamespace: "reposhift"

serviceAccount:
  create: true
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
