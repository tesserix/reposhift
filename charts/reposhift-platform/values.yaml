nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/tesserix/reposhift-platform
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

mode: saas

port: 8090

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

postgresql:
  host: "10.117.240.3"
  port: 5432
  database: reposhift_db
  user: reposhift_user
  sslmode: require

# Secrets — set via Helm values override or sealed secrets
jwtSecret: ""
encryptionKey: ""
adminToken: ""
postgresPassword: ""

github:
  clientID: ""
  clientSecret: ""
  redirectURL: ""

cors:
  allowedOrigins: "*"

operatorURL: "http://ado-git-migration:8080"

serviceAccount:
  create: true
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: reposhift.example.com
  tls: []
  #  - secretName: reposhift-tls
  #    hosts:
  #      - reposhift.example.com

istio:
  enabled: false
  gateway: istio-system/default-gateway
  host: reposhift.example.com

env: {}
