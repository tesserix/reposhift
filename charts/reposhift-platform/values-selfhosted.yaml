# Reposhift Platform — Self-Hosted Configuration
# Deploy with: helm install reposhift-platform ./charts/reposhift-platform -f charts/reposhift-platform/values-selfhosted.yaml
#
# REQUIRED: Set these secrets before deploying:
#   --set adminToken=<your-secure-token>
#   --set postgresPassword=<your-db-password>
#
# OPTIONAL: To enable GitHub SSO alongside admin token:
#   --set github.clientID=<id> --set github.clientSecret=<secret> --set github.redirectURL=<url>
#   --set jwtSecret=<32-char-min-secret>

mode: selfhosted
replicaCount: 1

# Admin token for CLI/API access (REQUIRED for self-hosted without GitHub OAuth).
# Generate with: openssl rand -hex 32
adminToken: ""

# JWT secret (only required if GitHub OAuth is enabled).
# Generate with: openssl rand -hex 32
jwtSecret: ""

# PostgreSQL connection.
postgresql:
  host: "localhost"
  port: 5432
  database: reposhift_db
  user: reposhift_user
  sslmode: disable

# Database password (REQUIRED).
postgresPassword: ""

# GitHub OAuth (OPTIONAL for self-hosted — enables GitHub SSO login).
# If not set, only admin token authentication is available.
github:
  clientID: ""
  clientSecret: ""
  redirectURL: ""

# Encryption key (only required if using DB-backed secrets without K8s).
# Generate with: openssl rand -hex 32
encryptionKey: ""

# CORS origins for the frontend.
corsAllowedOrigins: "http://localhost:3005"

# Kubernetes namespace for operator CRDs and secrets.
k8sNamespace: "default"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
