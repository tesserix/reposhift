apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reposhift-platform.fullname" . }}-migrations
  labels:
    {{- include "reposhift-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  001_platform_schema.up.sql: |
    -- Platform schema for multi-tenant SaaS + self-hosted mode
    -- Coexists with existing operator tables (migrations, work_item_migrations, github_projects, rate_limit_events)

    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Tenants
    CREATE TABLE IF NOT EXISTS tenants (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        name VARCHAR(255) NOT NULL,
        slug VARCHAR(100) NOT NULL UNIQUE,
        plan VARCHAR(50) NOT NULL DEFAULT 'free',
        mode VARCHAR(20) NOT NULL DEFAULT 'saas',
        k8s_namespace VARCHAR(255),
        settings JSONB DEFAULT '{}',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Users (GitHub identity)
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        github_id BIGINT UNIQUE,
        github_login VARCHAR(255) NOT NULL,
        github_email VARCHAR(255),
        avatar_url TEXT,
        name VARCHAR(255),
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Tenant membership
    CREATE TABLE IF NOT EXISTS tenant_members (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        tenant_id UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        role VARCHAR(50) NOT NULL DEFAULT 'member',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(tenant_id, user_id)
    );

    -- Per-tenant encrypted secrets (SaaS mode)
    CREATE TABLE IF NOT EXISTS tenant_secrets (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        tenant_id UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,
        name VARCHAR(255) NOT NULL,
        secret_type VARCHAR(50) NOT NULL,
        encrypted_data BYTEA NOT NULL,
        metadata JSONB DEFAULT '{}',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(tenant_id, name)
    );

    -- Per-tenant migration tracking (links tenant to operator CRDs)
    CREATE TABLE IF NOT EXISTS tenant_migrations (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        tenant_id UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,
        cr_name VARCHAR(255) NOT NULL,
        cr_namespace VARCHAR(255) NOT NULL,
        cr_kind VARCHAR(100) NOT NULL,
        display_name VARCHAR(255),
        config JSONB,
        status VARCHAR(50) DEFAULT 'pending',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(tenant_id, cr_name, cr_namespace)
    );

    -- GitHub OAuth state tokens (CSRF protection, short-lived)
    CREATE TABLE IF NOT EXISTS oauth_states (
        state VARCHAR(255) PRIMARY KEY,
        tenant_id UUID REFERENCES tenants(id),
        redirect_url TEXT,
        expires_at TIMESTAMPTZ NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Indexes
    CREATE INDEX IF NOT EXISTS idx_tenant_members_tenant ON tenant_members(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_tenant_members_user ON tenant_members(user_id);
    CREATE INDEX IF NOT EXISTS idx_tenant_secrets_tenant ON tenant_secrets(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_tenant_migrations_tenant ON tenant_migrations(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_tenant_migrations_cr ON tenant_migrations(cr_name, cr_namespace);
    CREATE INDEX IF NOT EXISTS idx_oauth_states_expires ON oauth_states(expires_at);

  002_seed_data.up.sql: |
    -- Seed default system tenant for platform-level operations
    INSERT INTO tenants (id, name, slug, plan, mode, settings)
    VALUES (
        '00000000-0000-0000-0000-000000000001',
        'System',
        'system',
        'enterprise',
        'saas',
        '{"is_system": true, "description": "Default system tenant for platform-level operations"}'::jsonb
    )
    ON CONFLICT (slug) DO NOTHING;

  003_migration_presets.up.sql: |
    -- Migration presets table for reusable branch filter configurations
    CREATE TABLE IF NOT EXISTS migration_presets (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        tenant_id UUID REFERENCES tenants(id) ON DELETE CASCADE,
        name VARCHAR(255) NOT NULL,
        description TEXT,
        branch_filter_mode VARCHAR(20),
        branches TEXT[],
        settings JSONB DEFAULT '{}',
        is_system BOOLEAN DEFAULT false,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_migration_presets_tenant ON migration_presets(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_migration_presets_system ON migration_presets(is_system) WHERE is_system = true;

    -- Seed system presets
    INSERT INTO migration_presets (tenant_id, name, description, branch_filter_mode, branches, settings, is_system)
    VALUES
        (
            NULL,
            'Standard Exclusions',
            'Excludes common non-essential branches: dependabot updates, WIP features, temporary branches, and test branches',
            'exclude',
            ARRAY['dependabot/*', 'feature/wip-*', 'tmp/*', 'test/*'],
            '{"recommended": true}'::jsonb,
            true
        ),
        (
            NULL,
            'Production Only',
            'Includes only production-ready branches: main, master, and release branches',
            'include',
            ARRAY['main', 'master', 'release/*'],
            '{"recommended": true}'::jsonb,
            true
        )
    ON CONFLICT DO NOTHING;
