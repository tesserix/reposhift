apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "reposhift-platform.fullname" . }}-migrate
  labels:
    {{- include "reposhift-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "reposhift-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "reposhift-platform.fullname" . }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DATABASE"; do
                echo "PostgreSQL is not ready yet, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready."
          envFrom:
            - configMapRef:
                name: {{ include "reposhift-platform.fullname" . }}
            - secretRef:
                name: {{ include "reposhift-platform.fullname" . }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposhift-platform.fullname" . }}
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -e
              echo "Running database migrations..."
              for f in /migrations/*.up.sql; do
                echo "Applying migration: $(basename $f)"
                psql -h "$POSTGRES_HOST" \
                     -p "$POSTGRES_PORT" \
                     -U "$POSTGRES_USER" \
                     -d "$POSTGRES_DATABASE" \
                     -f "$f" \
                     --set ON_ERROR_STOP=1
                echo "Migration $(basename $f) applied successfully."
              done
              echo "All migrations completed."
          envFrom:
            - configMapRef:
                name: {{ include "reposhift-platform.fullname" . }}
            - secretRef:
                name: {{ include "reposhift-platform.fullname" . }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "reposhift-platform.fullname" . }}
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: migrations
          configMap:
            name: {{ include "reposhift-platform.fullname" . }}-migrations
