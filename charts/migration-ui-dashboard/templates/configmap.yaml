apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "migration-ui-dashboard.fullname" . }}-config
  labels:
    {{- include "migration-ui-dashboard.labels" . | nindent 4 }}
data:
  # Backend API base URL
  backend-api-url: "http://{{ .Values.backend.operatorService.host }}:{{ .Values.backend.operatorService.port }}"

  # Operator service details
  operator-service-host: {{ .Values.backend.operatorService.host | quote }}
  operator-service-port: {{ .Values.backend.operatorService.port | quote }}

  # API endpoints
  health-endpoint: {{ .Values.backend.operatorService.healthEndpoint | quote }}
  metrics-endpoint: {{ .Values.backend.operatorService.metricsEndpoint | quote }}
  migrations-endpoint: {{ .Values.backend.operatorService.migrationsEndpoint | quote }}

  # Kubernetes namespace where migrations run
  migration-namespace: {{ .Values.backend.kubernetesApi.namespace | quote }}

  # Feature flags
  kubernetes-api-enabled: {{ .Values.backend.kubernetesApi.enabled | quote }}
