                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          clientSecretRef:
                            description: Client secret reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          tenantIdRef:
                            description: Tenant ID reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - clientIdRef
                        - clientSecretRef
                        - tenantIdRef
                        type: object
                    type: object
                  organization:
                    description: Azure DevOps organization
                    type: string
                  project:
                    description: Azure DevOps project
                    type: string
                  team:
                    description: |-
                      Azure DevOps team/board name (optional)
                      If specified, will filter work items to this team's board
                      Example: "Authority Team" for the Authority Team board
                    type: string
                required:
                - auth
                - organization
                - project
                type: object
              target:
                description: Target configuration
                properties:
                  auth:
                    description: Authentication configuration
                    properties:
                      appAuth:
                        description: GitHub App authentication (Option B - Recommended
                          for production)
                        properties:
                          appIdRef:
                            description: App ID reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          installationIdRef:
                            description: Installation ID reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          privateKeyRef:
                            description: Private Key reference (PEM format)
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - appIdRef
                        - installationIdRef
                        - privateKeyRef
                        type: object
                      token:
                        description: |-
                          Inline OAuth/PAT token (Option C - for OAuth flow from UI)
                          This token is passed directly from the frontend and used temporarily
                        type: string
                      tokenRef:
                        description: Personal Access Token reference (Option A)
                        properties:
                          key:
                            description: Key within the secret
                            type: string
                          name:
                            description: Name of the secret
                            type: string
                          namespace:
                            description: Namespace of the secret (optional, defaults
                              to same namespace)
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  owner:
                    description: GitHub owner
                    type: string
                  projectRef:
                    description: |-
                      ProjectRef references a GitHubProject to add migrated issues to (required)
                      The GitHub Project must be created before starting the work item migration
                      Accepts either:
                        - GitHubProject CR name (e.g., "java-authority-project")
                        - Actual GitHub Project name (e.g., "Java Authority")
                      The operator will search by CR name first, then by project name
                      See: https://github.com/tesserix/reposhift/blob/main/docs/HOW_TO_CREATE_GITHUB_PROJECT.md
                    type: string
                  repository:
                    description: |-
                      GitHub repository (required)
                      The repository where GitHub Issues will be created for migrated work items
                      If the repository doesn't exist, it will be automatically created
                      Example: "product-localgov-altitude-backend"
                    type: string
