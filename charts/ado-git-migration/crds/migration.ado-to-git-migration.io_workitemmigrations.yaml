                      type: string
                  required:
                  - migratedAt
                  - sourceId
                  - sourceTitle
                  - sourceType
                  - targetIssueNumber
                  - targetUrl
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration reflects the generation of the most
