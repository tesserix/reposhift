              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkItemMigrationSpec defines the desired state of WorkItemMigration
            properties:
              filters:
                description: Work item filters
                properties:
                  areaPaths:
                    description: Area paths to include
                    items:
                      type: string
                    type: array
                  assignedTo:
                    description: Assigned to users
                    items:
                      type: string
                    type: array
                  dateRange:
                    description: Date range filter
                    properties:
                      end:
                        description: End date
