    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: MonoRepoMigration is the Schema for the monorepomigrations API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MonoRepoMigrationSpec defines the desired state of MonoRepoMigration
            properties:
              settings:
                description: Migration settings
                properties:
                  cleanupBetweenRepos:
                    default: true
                    description: Delete bare clones after rewriting to save disk space
                    type: boolean
                  cloneDepth:
                    default: 0
                    description: |-
                      Clone depth for shallow cloning (0 = full history, N>0 = shallow with N commits)
                      Shallow cloning reduces clone time and disk usage. All branches are still fetched
                      but commit history is truncated to the specified depth.
                    minimum: 0
                    type: integer
                  continueOnError:
                    default: true
                    description: Continue processing remaining repos if one fails
                    type: boolean
                  diskSpaceLimitMB:
                    description: Disk space limit in MB (0 = unlimited)
                    minimum: 0
                    type: integer
                  parallelClones:
                    default: 3
                    description: Number of repos to clone in parallel (1-10, default
                      3)
                    maximum: 10
                    minimum: 1
                    type: integer
                  rateLimit:
                    description: Rate limiting settings
                    properties:
                      adoRequestsPerMinute:
                        description: Requests per minute for Azure DevOps
                        type: integer
                      githubRequestsPerMinute:
                        description: Requests per minute for GitHub
                        type: integer
                    type: object
                  retryAttempts:
                    default: 3
                    description: Retry attempts for failed operations
                    maximum: 10
                    minimum: 0
                    type: integer
                type: object
              source:
                description: Source Azure DevOps configuration (shared across all
