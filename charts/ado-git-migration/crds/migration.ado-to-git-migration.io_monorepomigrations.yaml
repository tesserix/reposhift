                            required:
                            - key
                            - name
                            type: object
                          tenantIdRef:
                            description: Tenant ID reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - clientIdRef
                        - clientSecretRef
                        - tenantIdRef
                        type: object
                    type: object
                  organization:
                    description: Organization name
                    minLength: 1
                    type: string
                  project:
                    description: Project name
                    minLength: 1
                    type: string
                required:
                - auth
                - organization
                - project
                type: object
              sourceRepos:
                description: List of source repositories to merge into the monorepo
                items:
                  description: MonoRepoSourceRepo defines a source repository to include
                    in the monorepo
                  properties:
                    defaultBranch:
                      description: Override default branch detection
                      type: string
                    excludeBranches:
                      description: Exclude these branches
                      items:
                        type: string
                      type: array
                    includeBranches:
                      description: Include only these branches (empty = all branches)
                      items:
                        type: string
                      type: array
                    name:
                      description: ADO repository name
                      minLength: 1
                      type: string
                    priority:
                      default: 0
                      description: Processing priority (lower = processed first)
                      minimum: 0
                      type: integer
                    subdirectoryName:
                      description: Override subdirectory name in the monorepo (defaults
                        to repo name)
                      type: string
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
              target:
                description: Target GitHub configuration for the monorepo
                properties:
                  apiUrl:
                    description: API URL (optional, defaults to https://api.github.com)
                    type: string
                  auth:
                    description: Authentication configuration
                    properties:
                      appAuth:
                        description: GitHub App authentication (Option B - Recommended
                          for production)
                        properties:
                          appIdRef:
                            description: App ID reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
