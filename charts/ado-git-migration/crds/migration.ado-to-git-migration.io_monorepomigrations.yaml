                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              errorMessage:
                description: Error message if failed
                type: string
              lastReconcileTime:
                description: Last reconcile time
                format: date-time
                type: string
              monoRepoUrl:
                description: GitHub URL of the created monorepo
                type: string
              observedGeneration:
                description: Reconcile generation
                format: int64
                type: integer
              phase:
                description: Phase of the overall migration
                enum:
