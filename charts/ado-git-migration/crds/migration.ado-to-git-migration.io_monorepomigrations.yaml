                - Validating
                - Cloning
                - Rewriting
                - Merging
                - Pushing
                - Completed
                - Failed
                - Cancelled
                - Paused
                type: string
              progress:
                description: Overall progress
                properties:
                  completedRepos:
                    description: Repos completed
                    type: integer
                  currentStep:
                    description: Current step description
                    type: string
                  failedRepos:
                    description: Repos failed
                    type: integer
                  percentage:
                    description: Percentage complete
                    type: integer
                  progressSummary:
                    description: Progress summary (e.g. "2/5 repos")
                    type: string
                  skippedRepos:
                    description: Repos skipped
                    type: integer
                  totalRepos:
                    description: Total repos to process
                    type: integer
                required:
                - completedRepos
                - failedRepos
                - percentage
                - skippedRepos
                - totalRepos
                type: object
              repoStatuses:
                description: Per-repo status tracking
                items:
                  description: MonoRepoRepoStatus tracks the status of an individual
                    repo within the migration
                  properties:
                    branchesMigrated:
                      description: Number of branches migrated
                      type: integer
                    commitCount:
                      description: Number of commits
                      type: integer
                    completionTime:
                      description: Completion time for this repo
                      format: date-time
                      type: string
                    defaultBranch:
                      description: Detected default branch
                      type: string
                    errorMessage:
                      description: Error message if failed
                      type: string
                    name:
                      description: Repository name
                      type: string
                    phase:
                      description: Current phase of this repo
                      enum:
                      - Pending
                      - Cloning
                      - Rewriting
                      - Merging
                      - Completed
                      - Failed
                      - Skipped
                      type: string
                    sizeMB:
                      description: Size in MB
                      format: int64
                      type: integer
                    startTime:
                      description: Start time for this repo
                      format: date-time
                      type: string
                    subdirectoryName:
                      description: Subdirectory name in the monorepo
