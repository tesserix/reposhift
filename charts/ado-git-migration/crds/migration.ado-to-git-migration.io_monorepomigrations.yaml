                            type: string
                          namespace:
                            description: Namespace of the secret (optional, defaults
                              to same namespace)
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  defaultBranch:
                    default: main
                    description: 'Default branch name for the monorepo (default: main)'
                    type: string
                  owner:
                    description: Owner (organization or user)
                    minLength: 1
                    type: string
                  repository:
                    description: Repository name for the monorepo
                    minLength: 1
                    type: string
                  visibility:
                    default: private
                    description: Repository visibility (public, private, internal)
                    enum:
                    - public
                    - private
                    - internal
                    type: string
                required:
