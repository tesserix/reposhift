---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: batchmigrations.migration.ado-to-git-migration.io
spec:
  group: migration.ado-to-git-migration.io
  names:
    kind: BatchMigration
    listKind: BatchMigrationList
    plural: batchmigrations
    shortNames:
    - bm
    singular: batchmigration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.progress.percentage
      name: Progress
      type: string
    - jsonPath: .spec.batchNumber
      name: Batch
      type: integer
    - jsonPath: .spec.priority
      name: Priority
      type: integer
    - jsonPath: .status.claimedBy
      name: Worker
      type: string
    - jsonPath: .status.retryCount
      name: Retries
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: BatchMigration is the Schema for the batchmigrations API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BatchMigrationSpec defines the desired state of BatchMigration
            properties:
              batchNumber:
                description: Batch number (for tracking and ordering)
                type: integer
              migrationJobRef:
                description: Parent migration job reference
                properties:
                  name:
                    description: Name of the referenced resource
                    type: string
                  namespace:
                    description: Namespace of the referenced resource
                    type: string
                required:
                - name
                - namespace
                type: object
              priority:
                description: Priority (higher = processed first)
                maximum: 100
                minimum: 0
                type: integer
              resources:
                description: Resources in this batch to migrate
                items:
                  description: MigrationResource defines a resource to migrate
                  properties:
                    config:
                      additionalProperties:
                        type: string
                      description: Additional configuration
                      type: object
                    settings:
                      description: Resource-specific settings
                      properties:
                        pipeline:
                          description: Pipeline-specific settings
                          properties:
                            convertToActions:
                              description: Convert to GitHub Actions
                              type: boolean
                            workflowTemplate:
                              description: Workflow template
                              type: string
                          type: object
                        repository:
                          description: Repository-specific settings
                          properties:
                            branchMapping:
                              additionalProperties:
                                type: string
                              description: Branch mapping
                              type: object
                            createIfNotExists:
                              description: Create repository if it doesn't exist
                              type: boolean
                            excludeBranches:
                              description: Exclude specific branches
                              items:
                                type: string
                              type: array
                            includeBranches:
                              description: Include specific branches
                              items:
                                type: string
                              type: array
                            visibility:
                              description: Repository visibility (public, private,
                                internal)
                              enum:
                              - public
                              - private
                              - internal
                              type: string
                          type: object
                        workItem:
                          description: Work item-specific settings
                          properties:
                            fieldMapping:
                              additionalProperties:
                                type: string
                              description: Field mapping
                              type: object
                            stateMapping:
                              additionalProperties:
                                type: string
                              description: State mapping
                              type: object
                            typeMapping:
                              additionalProperties:
                                type: string
                              description: Work item type mapping
                              type: object
                          type: object
                      type: object
                    sourceId:
                      description: Source identifier in Azure DevOps
                      type: string
                    sourceName:
                      description: Source name
                      type: string
                    targetName:
                      description: Target name in GitHub
                      type: string
                    type:
                      description: Type of resource (repository, work-item, build,
                        release)
                      enum:
                      - repository
                      - work-item
                      - build
                      - release
                      - pipeline
                      type: string
                  required:
                  - sourceId
                  - sourceName
                  - targetName
                  - type
                  type: object
                type: array
              retryPolicy:
                description: Retry policy for this batch
                properties:
                  backoffMultiplier:
                    description: Backoff multiplier for each retry (e.g., 2.0 for
                      exponential backoff)
                    maximum: 10
                    minimum: 1
                    type: integer
                  initialDelaySeconds:
                    description: Initial retry delay in seconds
                    maximum: 3600
                    minimum: 1
                    type: integer
                  maxDelaySeconds:
                    description: Maximum retry delay in seconds
                    maximum: 7200
                    minimum: 1
                    type: integer
                  maxRetries:
                    description: Maximum number of retry attempts
                    maximum: 10
                    minimum: 0
                    type: integer
                required:
                - backoffMultiplier
                - initialDelaySeconds
                - maxDelaySeconds
                - maxRetries
                type: object
              settings:
                description: Migration settings
                properties:
                  batchDelayMinutes:
                    default: 30
                    description: |-
                      Delay in minutes between batch repository migrations (default: 30)
                      This applies when migrating multiple repositories sequentially
                    maximum: 1440
                    minimum: 0
                    type: integer
                  batchSize:
                    description: Batch size for processing
                    maximum: 1000
                    minimum: 1
                    type: integer
                  cloneDepth:
                    default: 0
                    description: |-
                      Clone depth for shallow cloning (0 = full history, N>0 = shallow with N commits)
                      Shallow cloning significantly reduces clone time and disk usage for large repositories.
                      When set, branches and tags are still fetched but commit history is truncated.
                    minimum: 0
                    type: integer
                  handleLFS:
                    description: Handle LFS files
                    type: boolean
                  includeBuilds:
                    description: Include builds/releases migration
                    type: boolean
                  includePullRequests:
                    description: Include pull requests
                    type: boolean
                  includeTags:
                    description: Include tags
                    type: boolean
                  includeWorkItems:
                    description: Include work items migration
                    type: boolean
                  maxCommitCount:
                    description: 'Maximum commit count (default: 2000)'
                    maximum: 50000
                    minimum: 1
                    type: integer
                  maxHistoryDays:
                    default: 730
                    description: 'Maximum commit history days (default: 730 for 2
                      years)'
                    maximum: 3650
                    minimum: 1
                    type: integer
                  parallelWorkers:
                    description: Parallel workers
                    maximum: 20
                    minimum: 1
                    type: integer
                  rateLimit:
                    description: Rate limiting settings
                    properties:
                      adoRequestsPerMinute:
                        description: Requests per minute for Azure DevOps
                        type: integer
                      githubRequestsPerMinute:
                        description: Requests per minute for GitHub
                        type: integer
                    type: object
                  repository:
                    description: |-
                      Repository-specific settings (branch filtering, etc.)
