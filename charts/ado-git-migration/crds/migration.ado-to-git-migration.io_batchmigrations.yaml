                                type: string
                            required:
                            - key
                            - name
                            type: object
                          clientSecretRef:
                            description: Client secret reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          tenantIdRef:
                            description: Tenant ID reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - clientIdRef
                        - clientSecretRef
                        - tenantIdRef
