                format: date-time
                type: string
              errorMessage:
                description: Error message if failed
                type: string
              lastReconcileTime:
                description: Last reconcile time
                format: date-time
                type: string
              leaseExpiresAt:
                description: Lease expiration time (for worker health check)
                format: date-time
                type: string
              nextRetryTime:
                description: Next retry time if applicable
                format: date-time
                type: string
              phase:
                description: Processing phase
                type: string
              progress:
                description: Progress tracking
                properties:
                  completed:
                    description: Completed resources
                    type: integer
                  currentStep:
                    description: Current step description
                    type: string
                  failed:
                    description: Failed resources
                    type: integer
                  percentage:
                    description: Percentage complete
                    type: integer
                  processing:
                    description: Currently processing
                    type: integer
                  skipped:
                    description: Skipped resources
                    type: integer
                  total:
                    description: Total resources in batch
                    type: integer
                required:
                - completed
                - failed
                - percentage
                - processing
                - total
                type: object
              resourceStatuses:
                description: Resource migration statuses
                items:
                  description: ResourceMigrationStatus tracks individual resource
                    migration
                  properties:
                    completionTime:
                      description: Completion time
                      format: date-time
                      type: string
                    details:
                      description: Migration details
                      properties:
                        bytesTransferred:
                          description: Bytes transferred
                          format: int64
                          type: integer
                        currentOperation:
                          description: Current operation
                          type: string
                        itemsProcessed:
                          description: Items processed
                          type: integer
                        subResources:
                          description: Sub-resources
                          items:
                            description: SubResourceStatus tracks sub-resource migration
                              status
                            properties:
                              errorMessage:
                                description: Error message if failed
                                type: string
                              name:
                                description: Name of the sub-resource
                                type: string
                              progress:
                                description: Progress percentage
                                type: integer
                              status:
                                description: Status
                                type: string
                              type:
                                description: Type of the sub-resource
                                type: string
                            required:
                            - name
                            - progress
                            - status
                            - type
                            type: object
                          type: array
                        totalItems:
                          description: Total items
                          type: integer
                      type: object
                    error:
                      type: string
                    errorMessage:
                      description: Error message if failed
                      type: string
                    githubUrl:
                      description: GitHub URL if successful
                      type: string
                    name:
                      description: Backward compatibility fields
                      type: string
                    progress:
                      description: Progress percentage
                      type: integer
                    repositoryUrl:
                      type: string
                    resourceId:
                      description: Resource identifier
                      type: string
                    sourceName:
                      description: Source name
                      type: string
                    startTime:
                      description: Start time
                      format: date-time
                      type: string
                    status:
                      description: Status
                      type: string
                    targetName:
                      description: Target name
                      type: string
                    type:
                      description: Resource type
                      type: string
                  required:
                  - progress
                  - resourceId
                  - sourceName
                  - status
                  - targetName
                  - type
                  type: object
                type: array
              retryCount:
                description: Number of retry attempts
                type: integer
              startTime:
                description: Start time
                format: date-time
                type: string
              statistics:
                description: Statistics for this batch
                properties:
                  apiCalls:
                    additionalProperties:
                      type: integer
                    description: API calls made
                    type: object
                  avgResourceProcessingTimeSeconds:
                    description: Average processing time per resource in seconds
                    type: integer
                  dataTransferred:
                    description: Data transferred in bytes
                    format: int64
                    type: integer
                  duration:
                    description: Processing duration
                    type: string
                  itemsMigrated:
                    additionalProperties:
                      type: integer
                    description: Items migrated per resource type
                    type: object
                type: object
            required:
            - phase
            - progress
            - retryCount
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
