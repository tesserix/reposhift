                      autoInit:
                        description: Auto-initialize repository
                        type: boolean
                      gitignoreTemplate:
                        description: Gitignore template
                        type: string
                      licenseTemplate:
                        description: License template
                        type: string
                      visibility:
                        description: Repository visibility (public, private, internal)
                        enum:
                        - public
                        - private
                        - internal
                        type: string
                    type: object
                  owner:
                    description: Owner (organization or user)
                    minLength: 1
                    type: string
                  repository:
                    description: Repository name (optional, will be auto-generated
                      based on naming rules if not specified)
                    type: string
                  visibility:
                    description: Repository visibility (public, private, internal)
                    enum:
                    - public
                    - private
                    - internal
                    type: string
                required:
                - auth
                - owner
                type: object
              timeoutMinutes:
                description: Timeout for this batch processing
                type: integer
