                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - appIdRef
                        - installationIdRef
                        - privateKeyRef
                        type: object
                      token:
                        description: |-
                          Inline OAuth/PAT token (Option C - for OAuth flow from UI)
                          This token is passed directly from the frontend and used temporarily
                        type: string
                      tokenRef:
                        description: Personal Access Token reference (Option A)
                        properties:
                          key:
                            description: Key within the secret
                            type: string
                          name:
                            description: Name of the secret
                            type: string
                          namespace:
                            description: Namespace of the secret (optional, defaults
                              to same namespace)
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  autoGenerateName:
                    description: |-
                      Auto-generate repository name based on source metadata
