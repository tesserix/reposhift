                        description: Branch mapping
                        type: object
                      createIfNotExists:
                        description: Create repository if it doesn't exist
                        type: boolean
                      excludeBranches:
                        description: Exclude specific branches
                        items:
                          type: string
                        type: array
                      includeBranches:
                        description: Include specific branches
                        items:
                          type: string
                        type: array
                      visibility:
                        description: Repository visibility (public, private, internal)
                        enum:
                        - public
                        - private
                        - internal
                        type: string
                    type: object
                  retryAttempts:
                    description: Retry attempts
                    maximum: 10
                    minimum: 0
                    type: integer
                  sync:
                    description: Continuous sync settings
                    properties:
                      branchFilter:
                        description: Sync specific branches only (if empty, sync all
                          branches)
                        items:
                          type: string
                        type: array
                      enabled:
                        description: |-
                          Enable continuous synchronization
                          When enabled, the operator will periodically sync changes from ADO to GitHub
                        type: boolean
                      forcePush:
                        description: Force push (use with caution, may overwrite GitHub
                          changes)
                        type: boolean
                      intervalMinutes:
                        description: 'Sync interval in minutes (default: 5, min: 1,
                          max: 1440 for 24 hours)'
                        maximum: 1440
                        minimum: 1
                        type: integer
                      syncTags:
                        description: Sync tags
                        type: boolean
                    type: object
                type: object
              source:
                description: Source Azure DevOps configuration
                properties:
                  apiUrl:
                    description: API URL (optional, defaults to https://dev.azure.com)
                    type: string
                  auth:
                    description: Authentication configuration
                    properties:
                      pat:
                        description: Personal Access Token configuration
                        properties:
                          tokenRef:
                            description: Token reference
                            properties:
                              key:
                                description: Key within the secret
                                type: string
                              name:
                                description: Name of the secret
                                type: string
                              namespace:
                                description: Namespace of the secret (optional, defaults
                                  to same namespace)
                                type: string
                            required:
                            - key
                            - name
                            type: object
                        required:
                        - tokenRef
                        type: object
                      servicePrincipal:
                        description: Service Principal configuration
                        properties:
