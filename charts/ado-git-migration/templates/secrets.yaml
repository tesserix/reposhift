{{- if .Values.auth.createSecrets }}
# Azure Service Principal Secret
apiVersion: v1
kind: Secret
metadata:
  name: azure-sp-secret
  namespace: {{ .Values.migrationNamespace.name }}
  labels:
    {{- include "ado-git-migration.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentication
type: Opaque
stringData:
  client-id: {{ .Values.auth.azure.clientId | quote }}
  client-secret: {{ .Values.auth.azure.clientSecret | quote }}
  tenant-id: {{ .Values.auth.azure.tenantId | quote }}

{{- if .Values.auth.github.token }}
---
# GitHub Personal Access Token Secret
apiVersion: v1
kind: Secret
metadata:
  name: github-token-secret
  namespace: {{ .Values.migrationNamespace.name }}
  labels:
    {{- include "ado-git-migration.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentication
type: Opaque
stringData:
  token: {{ .Values.auth.github.token | quote }}
{{- end }}

{{- if .Values.auth.githubApp.appId }}
---
# GitHub App Authentication Secret
apiVersion: v1
kind: Secret
metadata:
  name: github-app-secret
  namespace: {{ .Values.migrationNamespace.name }}
  labels:
    {{- include "ado-git-migration.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentication
type: Opaque
stringData:
  app-id: {{ .Values.auth.githubApp.appId | quote }}
  installation-id: {{ .Values.auth.githubApp.installationId | quote }}
  private-key: {{ .Values.auth.githubApp.privateKey | quote }}
{{- end }}

{{- end }}