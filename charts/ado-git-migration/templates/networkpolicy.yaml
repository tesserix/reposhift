{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ado-git-migration.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ado-git-migration.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ado-git-migration.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  {{- range .Values.networkPolicy.ingressRules }}
  - from:
    {{- if .from }}
    {{- toYaml .from | nindent 4 }}
    {{- else }}
    - namespaceSelector: {}
    {{- end }}
    ports:
    {{- toYaml .ports | nindent 4 }}
  {{- end }}
  egress:
  {{- range .Values.networkPolicy.egressRules }}
  - to:
    {{- toYaml .to | nindent 4 }}
    {{- if .ports }}
    ports:
    {{- toYaml .ports | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}