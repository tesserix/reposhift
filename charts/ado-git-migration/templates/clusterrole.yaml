apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ado-git-migration.fullname" . }}-manager-role
  labels:
    {{- include "ado-git-migration.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["migration.ado-to-git-migration.io"]
  resources: ["adotogitmigrations", "adodiscoveries", "pipelinetoworkflows", "migrationjobs", "workitemmigrations", "githubprojects"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["migration.ado-to-git-migration.io"]
  resources: ["adotogitmigrations/status", "adodiscoveries/status", "pipelinetoworkflows/status", "migrationjobs/status", "workitemmigrations/status", "githubprojects/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["migration.ado-to-git-migration.io"]
  resources: ["adotogitmigrations/finalizers", "adodiscoveries/finalizers", "pipelinetoworkflows/finalizers", "migrationjobs/finalizers", "workitemmigrations/finalizers", "githubprojects/finalizers"]
  verbs: ["update"]