apiVersion: v1
kind: Service
metadata:
  name: {{ include "ado-git-migration.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ado-git-migration.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "ado-git-migration.selectorLabels" . | nindent 4 }}