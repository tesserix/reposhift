groups:
  - name: ado_github_migration_critical
    interval: 30s
    rules:
      # Operator Health
      - alert: OperatorUnhealthy
        expr: ado_github_migration_operator_health == 0
        for: 2m
        labels:
          severity: critical
          component: operator
        annotations:
          summary: "ADO-GitHub Migration Operator is unhealthy"
          description: "Component {{ $labels.component }} has been unhealthy for more than 2 minutes"
          runbook_url: "https://docs.example.com/runbooks/operator-unhealthy"

      - alert: LeaderElectionLost
        expr: ado_github_migration_leader_election_status == 0
        for: 5m
        labels:
          severity: warning
          component: operator
        annotations:
          summary: "Operator lost leader election"
          description: "Operator is not the leader, ensure at least one instance is elected"

      # Migration Failures
      - alert: HighMigrationFailureRate
        expr: |
          (
            sum(rate(ado_github_migration_migrations_total{status="failed"}[5m]))
            /
            sum(rate(ado_github_migration_migrations_total[5m]))
          ) > 0.10
        for: 10m
        labels:
          severity: critical
          component: migration
        annotations:
          summary: "High migration failure rate detected"
          description: "More than 10% of migrations are failing (current: {{ $value | humanizePercentage }})"
          runbook_url: "https://docs.example.com/runbooks/high-failure-rate"

      - alert: MigrationStuck
        expr: |
          sum by (migration_type, phase) (ado_github_migration_migrations_active) > 0
          and
          changes(ado_github_migration_migrations_active[30m]) == 0
        for: 30m
        labels:
          severity: warning
          component: migration
        annotations:
          summary: "Migration appears stuck"
          description: "Migration of type {{ $labels.migration_type }} in phase {{ $labels.phase }} has not progressed in 30 minutes"
          runbook_url: "https://docs.example.com/runbooks/migration-stuck"

      # Error Rates
      - alert: HighErrorRate
        expr: sum(rate(ado_github_migration_errors_total[5m])) > 5
        for: 5m
        labels:
          severity: critical
          component: operator
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanize }} errors/sec"
          runbook_url: "https://docs.example.com/runbooks/high-error-rate"

      - alert: TerminalErrorsIncreasing
        expr: sum(rate(ado_github_migration_errors_total{error_type="terminal"}[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
          component: operator
        annotations:
          summary: "Terminal errors are increasing"
          description: "Terminal error rate is {{ $value | humanize }} errors/sec - these require manual intervention"
          runbook_url: "https://docs.example.com/runbooks/terminal-errors"

      # API Rate Limits
      - alert: APIRateLimitCritical
        expr: ado_github_migration_api_rate_limit_remaining < 100
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API rate limit critically low"
          description: "{{ $labels.service }} API has only {{ $value }} requests remaining"
          runbook_url: "https://docs.example.com/runbooks/rate-limit-critical"

      - alert: APIRateLimitWarning
        expr: ado_github_migration_api_rate_limit_remaining < 500
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API rate limit running low"
          description: "{{ $labels.service }} API has {{ $value }} requests remaining"

      - alert: FrequentRateLimitHits
        expr: sum by (service) (rate(ado_github_migration_rate_limit_hits_total[15m])) > 0.1
        for: 15m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Frequently hitting API rate limits"
          description: "{{ $labels.service }} is hitting rate limits {{ $value | humanize }} times/sec"
          runbook_url: "https://docs.example.com/runbooks/rate-limit-hits"

      # Performance
      - alert: HighReconciliationLatency
        expr: |
          histogram_quantile(0.95,
            sum by (controller, le) (
              rate(ado_github_migration_reconciliation_duration_seconds_bucket[5m])
            )
          ) > 30
        for: 10m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "High reconciliation latency"
          description: "{{ $labels.controller }} p95 reconciliation latency is {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.example.com/runbooks/high-latency"

      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (
              rate(ado_github_migration_api_request_duration_seconds_bucket[5m])
            )
          ) > 10
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API latency"
          description: "{{ $labels.service }} p95 API latency is {{ $value | humanizeDuration }}"

      # Resource Usage
      - alert: HighMemoryUsage
        expr: |
          ado_github_migration_memory_usage_bytes{memory_type="heap"} / 1024 / 1024 > 2048
        for: 5m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "High memory usage"
          description: "Heap memory usage is {{ $value | humanize }}MB"
          runbook_url: "https://docs.example.com/runbooks/high-memory"

      - alert: GoroutineLeak
        expr: |
          (
            ado_github_migration_goroutines_active
            -
            ado_github_migration_goroutines_active offset 1h
          ) > 1000
        for: 10m
        labels:
          severity: critical
          component: resources
        annotations:
          summary: "Potential goroutine leak detected"
          description: "Goroutine count increased by {{ $value }} in the last hour (current: {{ $labels.goroutines }})"
          runbook_url: "https://docs.example.com/runbooks/goroutine-leak"

      # Queue Issues
      - alert: HighQueueDepth
        expr: ado_github_migration_queue_depth > 100
        for: 10m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "High queue depth"
          description: "{{ $labels.controller }} queue has {{ $value }} items pending"
          runbook_url: "https://docs.example.com/runbooks/high-queue-depth"

      - alert: HighQueueLatency
        expr: |
          histogram_quantile(0.95,
            sum by (controller, le) (
              rate(ado_github_migration_queue_latency_seconds_bucket[5m])
            )
          ) > 60
        for: 10m
        labels:
          severity: warning
          component: queue
        annotations:
          summary: "High queue latency"
          description: "{{ $labels.controller }} p95 queue latency is {{ $value | humanizeDuration }}"

      # Status Update Issues
      - alert: HighStatusUpdateConflicts
        expr: |
          sum by (controller) (rate(ado_github_migration_status_update_conflicts_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
          component: controller
        annotations:
          summary: "High status update conflict rate"
          description: "{{ $labels.controller }} is experiencing {{ $value | humanize }} conflicts/sec"
          runbook_url: "https://docs.example.com/runbooks/status-conflicts"

      # Retry Issues
      - alert: ExcessiveRetries
        expr: sum by (controller) (rate(ado_github_migration_retries_total[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: controller
        annotations:
          summary: "Excessive retry rate"
          description: "{{ $labels.controller }} retry rate is {{ $value | humanize }} retries/sec"
          runbook_url: "https://docs.example.com/runbooks/excessive-retries"

  - name: ado_github_migration_business
    interval: 5m
    rules:
      # Business Impact
      - alert: NoMigrationsInProgress
        expr: sum(ado_github_migration_migrations_active) == 0
        for: 1h
        labels:
          severity: info
          component: business
        annotations:
          summary: "No migrations in progress"
          description: "No migrations have been active for 1 hour - may be expected"

      - alert: LargeMigrationInProgress
        expr: |
          sum by (migration_type) (ado_github_migration_migrations_active) > 50
        for: 30m
        labels:
          severity: info
          component: business
        annotations:
          summary: "Large migration batch in progress"
          description: "{{ $value }} {{ $labels.migration_type }} migrations are currently active"

      - alert: HighMigrationCost
        expr: |
          sum(rate(ado_github_migration_migration_cost_estimate_total[1h])) * 3600 * 24 > 1000
        for: 2h
        labels:
          severity: warning
          component: business
        annotations:
          summary: "High daily migration cost estimate"
          description: "Estimated daily cost is ${{ $value | humanize }} based on current rate"

  - name: ado_github_migration_slo
    interval: 5m
    rules:
      # SLO: 95% of migrations should succeed
      - alert: MigrationSuccessSLOBreach
        expr: |
          (
            sum(rate(ado_github_migration_migrations_total{status="success"}[1h]))
            /
            sum(rate(ado_github_migration_migrations_total[1h]))
          ) < 0.95
        for: 15m
        labels:
          severity: critical
          component: slo
        annotations:
          summary: "Migration success rate SLO breach"
          description: "Migration success rate ({{ $value | humanizePercentage }}) is below 95% SLO"
          runbook_url: "https://docs.example.com/runbooks/slo-breach"

      # SLO: 99% of reconciliations should complete in under 10 seconds
      - alert: ReconciliationLatencySLOBreach
        expr: |
          histogram_quantile(0.99,
            sum by (le) (
              rate(ado_github_migration_reconciliation_duration_seconds_bucket[5m])
            )
          ) > 10
        for: 15m
        labels:
          severity: warning
          component: slo
        annotations:
          summary: "Reconciliation latency SLO breach"
          description: "P99 reconciliation latency ({{ $value | humanizeDuration }}) exceeds 10s SLO"
          runbook_url: "https://docs.example.com/runbooks/latency-slo-breach"

      # SLO: Error rate should be below 1%
      - alert: ErrorRateSLOBreach
        expr: |
          sum(rate(ado_github_migration_errors_total[5m]))
          /
          sum(rate(ado_github_migration_reconciliation_duration_seconds_count[5m]))
          > 0.01
        for: 10m
        labels:
          severity: warning
          component: slo
        annotations:
          summary: "Error rate SLO breach"
          description: "Error rate ({{ $value | humanizePercentage }}) exceeds 1% SLO"
          runbook_url: "https://docs.example.com/runbooks/error-rate-slo"

  - name: ado_github_migration_capacity
    interval: 5m
    rules:
      # Capacity Planning
      - alert: ApproachingCapacityLimit
        expr: sum(ado_github_migration_migrations_active) > 80
        for: 30m
        labels:
          severity: warning
          component: capacity
        annotations:
          summary: "Approaching operator capacity"
          description: "{{ $value }} concurrent migrations (recommend scaling if sustained above 80)"

      - alert: LowCacheHitRate
        expr: |
          sum by (cache_type) (rate(ado_github_migration_cache_hits_total[15m]))
          /
          (
            sum by (cache_type) (rate(ado_github_migration_cache_hits_total[15m]))
            +
            sum by (cache_type) (rate(ado_github_migration_cache_misses_total[15m]))
          ) < 0.50
        for: 30m
        labels:
          severity: info
          component: performance
        annotations:
          summary: "Low cache hit rate"
          description: "{{ $labels.cache_type }} cache hit rate is {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.example.com/runbooks/low-cache-hit-rate"

  - name: ado_github_migration_deadman
    interval: 1m
    rules:
      # Deadman switch - ensure we're receiving metrics
      - alert: MigrationOperatorDown
        expr: up{job="ado-github-migration-operator"} == 0
        for: 2m
        labels:
          severity: critical
          component: operator
        annotations:
          summary: "Migration operator is down"
          description: "Migration operator instance {{ $labels.instance }} has been down for 2 minutes"
          runbook_url: "https://docs.example.com/runbooks/operator-down"

      - alert: NoMetricsReceived
        expr: |
          absent(ado_github_migration_migrations_total)
          or
          absent(ado_github_migration_reconciliation_duration_seconds_count)
        for: 5m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "No metrics being received"
          description: "Migration operator metrics have not been received for 5 minutes"
          runbook_url: "https://docs.example.com/runbooks/no-metrics"
