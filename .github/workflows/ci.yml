name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  GCP_PROJECT_ID: tesseracthub-480811
  GKE_CLUSTER: tesseract-prod-in-gke
  GKE_REGION: asia-south1

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # --- Go tests (shared for operator + platform) ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Go tests
        run: |
          go vet ./internal/platform/... ./internal/services/...
          go test ./internal/platform/... ./internal/services/... -v -count=1 -timeout 5m

  # --- Operator image ---
  operator:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push operator
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build --no-cache -t ${{ env.REGISTRY }}/tesserix/reposhift:${SHA} -t ${{ env.REGISTRY }}/tesserix/reposhift:latest -f Dockerfile .
          docker push ${{ env.REGISTRY }}/tesserix/reposhift:${SHA}
          docker push ${{ env.REGISTRY }}/tesserix/reposhift:latest

  # --- Platform API image ---
  platform:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push platform
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build --no-cache -t ${{ env.REGISTRY }}/tesserix/reposhift-platform:${SHA} -t ${{ env.REGISTRY }}/tesserix/reposhift-platform:latest -f Dockerfile.platform .
          docker push ${{ env.REGISTRY }}/tesserix/reposhift-platform:${SHA}
          docker push ${{ env.REGISTRY }}/tesserix/reposhift-platform:latest

  # --- Web frontend image ---
  web:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build --no-cache -t ${{ env.REGISTRY }}/tesserix/reposhift-web:${SHA} -t ${{ env.REGISTRY }}/tesserix/reposhift-web:latest -f web/Dockerfile web/
          docker push ${{ env.REGISTRY }}/tesserix/reposhift-web:${SHA}
          docker push ${{ env.REGISTRY }}/tesserix/reposhift-web:latest
