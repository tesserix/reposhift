apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ado-to-git-migration-worker-hpa
  namespace: migration-system
  labels:
    app: ado-to-git-migration
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ado-to-git-migration-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
  # Scale based on CPU utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Scale based on memory utilization
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  # Scale based on pending batches (custom metric from Prometheus)
  # Requires Prometheus Adapter or KEDA
  - type: Pods
    pods:
      metric:
        name: migration_pending_batches
      target:
        type: AverageValue
        averageValue: "2"  # Scale up if avg pending batches > 2 per pod
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30  # Wait 30s before scaling up
      policies:
      - type: Percent
        value: 100  # Double the replicas
        periodSeconds: 30
      - type: Pods
        value: 10   # Or add 10 pods at a time
        periodSeconds: 30
      selectPolicy: Max  # Use the policy that scales up most
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50   # Scale down by 50% max
        periodSeconds: 60
      - type: Pods
        value: 5    # Or remove 5 pods at a time max
        periodSeconds: 60
      selectPolicy: Min  # Use the policy that scales down least
---
# KEDA ScaledObject (alternative to HPA for more advanced scaling)
# Requires KEDA operator: https://keda.sh/
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ado-to-git-migration-worker-scaledobject
  namespace: migration-system
  labels:
    app: ado-to-git-migration
    component: worker
spec:
  scaleTargetRef:
    name: ado-to-git-migration-worker
  minReplicaCount: 2
  maxReplicaCount: 50
  pollingInterval: 15  # Check metrics every 15 seconds
  cooldownPeriod: 300  # Wait 5 minutes after last trigger before scaling down
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 10
            periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
          - type: Percent
            value: 50
            periodSeconds: 60
  triggers:
  # Scale based on Prometheus metrics
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring:9090
      metricName: migration_pending_batches_total
      query: |
        sum(
          migration_pending_batches{
            namespace="migration-system",
            phase="Pending"
          }
        )
      threshold: "10"  # Scale up if more than 10 pending batches
      activationThreshold: "2"  # Start scaling at 2 pending batches
  # Scale based on processing rate
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring:9090
      metricName: migration_processing_rate
      query: |
        sum(
          rate(
            migration_resources_processed_total{
              namespace="migration-system"
            }[2m]
          )
        ) /
        count(
          kube_pod_info{
            namespace="migration-system",
            pod=~"ado-to-git-migration-worker-.*"
          }
        )
      threshold: "0.5"  # Scale up if processing rate drops below 0.5 resources/min/pod
      activationThreshold: "0.1"
  # Scale based on failed batches (to recover faster)
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring:9090
      metricName: migration_failed_batches_rate
      query: |
        sum(
          rate(
            migration_batches_total{
              namespace="migration-system",
              phase="Failed"
            }[5m]
          )
        ) > 0
      threshold: "1"  # Scale up if we have failed batches
      activationThreshold: "0.5"
---
# Vertical Pod Autoscaler (optional - for optimizing resource requests/limits)
# Requires VPA operator: https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ado-to-git-migration-worker-vpa
  namespace: migration-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ado-to-git-migration-worker
  updatePolicy:
    updateMode: "Auto"  # Can be "Off", "Initial", or "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: worker
      minAllowed:
        cpu: 500m
        memory: 512Mi
      maxAllowed:
        cpu: 4000m
        memory: 4Gi
      controlledResources:
      - cpu
      - memory
---
# Cluster Autoscaler configuration (via annotations on node pool/ASG/etc.)
